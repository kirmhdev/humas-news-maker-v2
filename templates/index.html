<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Agregator Berita</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .news-card img {
        height: 200px;
        object-fit: cover;
      }

      .source-badge {
        position: absolute;
        top: 10px;
        right: 10px;
      }

      .selected-btn-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        position: fixed;
        bottom: 20px;
        right: 20px;
        border-radius: 10px;
        padding: 10px;
        z-index: 1000;
        background-color: rgb(21, 46, 235);
        color: white;
        text-decoration: none;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        transition: background-color 0.3s;
      }

      .selected-btn-container:hover {
        background-color: rgb(21, 46, 235);
      }

      .selected-news-counter {
        font-size: 14px;
        font-weight: bold;
        margin: auto 0;
      }
    </style>
  </head>

  <body class="bg-light">
    <div class="container py-5">
      <h1 class="text-center mb-4">Berita Terkini</h1>

      <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4"></div>

      <a href="/selected" class="selected-btn-container">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          height="24px"
          viewBox="0 -960 960 960"
          width="24px"
          fill="#e3e3e3"
        >
          <path
            d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h440l200 200v440q0 33-23.5 56.5T760-120H200Zm0-80h560v-400H600v-160H200v560Zm80-80h400v-80H280v80Zm0-320h200v-80H280v80Zm0 160h400v-80H280v80Zm-80-320v160-160 560-560Z"
          />
        </svg>
        <p class="selected-news-counter"></p>
      </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      let newsData = [] // Variable to store the fetched news data

      const selectedNewsCounter = document.querySelector(
        ".selected-news-counter",
      )
      const getSelectedNewsCount = () => {
        fetch("/api/get-selected-news-count")
          .then((response) => response.json())
          .then((data) => {
            selectedNewsCounter.textContent = data.count
          })
          .catch((error) => {
            console.error(
              "Terjadi kesalahan saat memuat jumlah berita yang dipilih:",
              error,
            )
          })
      }

      // Load news
      fetch("/api/news")
        .then((response) => response.json())
        .then((data) => {
          if (!data || data.length === 0) {
            document.querySelector(".row").innerHTML =
              '<p class="text-center">Tidak ada berita yang tersedia.</p>'
            return
          }
          data.forEach((item, index) => {
            const card = `
            <div class="col">
              <div class="card h-100 news-card shadow-sm position-relative">
                <span class="badge bg-danger source-badge">${item.prefix}</span>
                <img src="${item.image}" class="card-img-top" alt="${item.title}" onclick="addNewsHandler(${index})" style="cursor: pointer;">
                <div class="card-body d-flex flex-column">
                  <span class="text-primary fw-bold" style="font-size: 0.8rem;">${item.category}</span>
                  <h5 class="card-title mt-2">${item.title}</h5>
                  <div class="mt-auto">
                    <small class="text-muted d-block mb-3">📅 ${item.date}</small>
                    <a href="${item.url}" class="btn btn-outline-dark btn-sm w-100" target="_blank">Baca Selengkapnya</a>
                  </div>
                </div>
              </div>
            </div>
          `
            document.querySelector(".row").innerHTML += card
            newsData.push(item) // Store the news item in the array
          })
          console.log(newsData)
        })
        .catch((error) => {
          console.error("Terjadi kesalahan saat memuat berita:", error)
        })

      getSelectedNewsCount() // Call the function to update the selected news count on page load

      function addNewsHandler(newsItem) {
        console.log("Menambahkan berita:", newsData[newsItem])

        fetch("/add-news", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(newsData[newsItem]),
        })
          .then((res) => {
            if (res.ok) {
              alert("Berita berhasil ditambahkan.")
              getSelectedNewsCount() // Update the selected news count after adding
            } else {
              alert("Gagal menambahkan berita.")
            }
          })
          .catch((error) => {
            console.error("Terjadi kesalahan saat menambahkan berita:", error)
            alert("Terjadi kesalahan saat menambahkan berita.")
          })
      }
    </script>
  </body>
</html>
