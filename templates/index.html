<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Agregator Berita</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .news-card img {
      height: 200px;
      object-fit: cover;
    }

    .source-badge {
      position: absolute;
      top: 10px;
      right: 10px;
    }
  </style>
</head>

<body class="bg-light">

  <div class="container py-5">
    <h1 class="text-center mb-4">Berita Terkini</h1>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
      {% if news %}
      {% for item in news %}
      <div class="col">
        <div class="card h-100 news-card shadow-sm position-relative">
          <span class="badge bg-danger source-badge">{{ item.source }}</span>

          <img src="{{ item.image }}" class="card-img-top" alt="{{ item.title }}">

          <div class="card-body d-flex flex-column">
            <span class="text-primary fw-bold" style="font-size: 0.8rem;">{{ item.category }}</span>

            <h5 class="card-title mt-2">{{ item.title }}</h5>

            <div class="mt-auto">
              <small class="text-muted d-block mb-3">📅 {{ item.date }}</small>
              <a href="{{ item.url }}" class="btn btn-outline-dark btn-sm w-100" target="_blank">Baca Selengkapnya</a>
            </div>
          </div>
        </div>
      </div>
      {% endfor %}
      {% else %}
      <div class="col-12 text-center py-5">
        <h4 class="text-muted">Tidak ada berita yang ditemukan.</h4>
      </div>
      {% endif %}
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
