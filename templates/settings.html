<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HUMAS News Maker V2 | Settings</title>
    <link
      href="{{url_for('static', filename='css/settings.css')}}"
      rel="stylesheet"
    />
  </head>
  <body>
    <a class="back-btn" href="/selected"><- Kembali</a>
    <button class="reset-btn" id="reset-btn" title="Reset setelan ke default">
      Reset
    </button>
    <div class="container">
      <header>
        <h1>Settings</h1>
      </header>

      <form id="settings-form">
        <div class="section-card">
          <div class="section-title">1. General Settings</div>
          <div class="form-group">
            <label>Suggested News Categories (Dinamis)</label>
            <div class="tags-container" id="category-tags-container"></div>
            <div class="tag-input-group">
              <input
                type="text"
                id="new-category-input"
                placeholder="Tambah kategori baru... (Contoh: Ekonomi)"
              />
              <button
                type="button"
                class="btn btn-secondary"
                onclick="addCategoryTag()"
              >
                Tambah
              </button>
            </div>
          </div>
        </div>

        <div class="section-card">
          <div class="section-title">2. News Scraping Configuration</div>

          <div class="form-group" style="margin-bottom: 30px">
            <label style="font-weight: 600; font-size: 15px"
              >Sumber Berita Rekomendasi</label
            >
            <div id="suggested-sources-container"></div>
            <button
              type="button"
              class="btn btn-secondary"
              onclick="addSuggestedSourceElement()"
            >
              + Tambah Sumber Rekomendasi
            </button>
          </div>

          <div class="form-group">
            <label style="font-weight: 600; font-size: 15px"
              >Sumber Berita</label
            >
            <div id="news-sources-container"></div>
            <button
              type="button"
              class="btn btn-secondary"
              onclick="addNewsSourceElement()"
            >
              + Tambah Sumber Berita
            </button>
          </div>

          <div class="form-group">
            <label style="font-weight: 600; font-size: 15px"
              >Sumber Klasemen</label
            >
            <div id="classement-sources-container"></div>
            <button
              type="button"
              class="btn btn-secondary"
              onclick="addClassementSourceElement()"
            >
              + Tambah Sumber Klasemen
            </button>
          </div>
        </div>

        <div class="section-card">
          <div class="section-title">3. API & Request Settings</div>
          <div class="form-row">
            <div class="form-group">
              <label for="groq-model">Groq Model LLM</label>
              <input
                type="text"
                id="groq-model"
                name="groq-model"
                value="openai/gpt-oss-120b"
              />
            </div>
            <div class="form-group">
              <label for="groq-api-key">Groq API Key</label>
              <input
                type="text"
                id="groq-api-key"
                name="groq-api-key"
                placeholder="Masukkan API Key dari Groq..."
              />
            </div>
          </div>
          <div class="form-group">
            <label for="groq-system-prompt">Groq System Prompt</label>
            <textarea
              id="groq-system-prompt"
              name="groq-system-prompt"
              rows="4"
              placeholder="Masukkan system prompt untuk mengatur perilaku AI..."
            ></textarea>
          </div>
          <div class="form-group">
            <label for="user-agent">HTTP User-Agent</label>
            <input type="text" id="user-agent" name="user-agent" />
          </div>
        </div>

        <div class="section-card">
          <div class="section-title">4. Document Layout & Typography</div>

          <div class="form-row">
            <div class="form-group">
              <label for="title-font">Font Judul</label>
              <select id="title-font">
                <option value="Times New Roman">Times New Roman</option>
                <option value="Arial">Arial</option>
                <option value="Helvetica">Helvetica</option>
                <option value="Georgia">Georgia</option>
              </select>
            </div>
            <div class="form-group">
              <label for="title-size">Ukuran Font Judul (pt)</label>
              <input type="number" id="title-size" min="1" />
            </div>
            <div
              class="form-group"
              style="display: flex; align-items: flex-end; padding-bottom: 10px"
            >
              <label class="checkbox-container">
                <input type="checkbox" id="title-bold" /> Judul Bold (Tebal)
              </label>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="paragraph-font">Font Paragraf</label>
              <select id="paragraph-font">
                <option value="Times New Roman">Times New Roman</option>
                <option value="Arial">Arial</option>
                <option value="Helvetica">Helvetica</option>
                <option value="Georgia">Georgia</option>
              </select>
            </div>
            <div class="form-group">
              <label for="paragraph-size">Ukuran Font Paragraf (pt)</label>
              <input type="number" id="paragraph-size" min="1" />
            </div>
            <div class="form-group">
              <label for="image-height">Tinggi Gambar Max (inch)</label>
              <input type="number" id="image-height" step="0.01" min="0" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="page-width">Lebar Halaman (inch)</label>
              <input type="number" id="page-width" step="0.01" min="0" />
            </div>
            <div class="form-group">
              <label for="page-height">Tinggi Halaman (inch)</label>
              <input type="number" id="page-height" step="0.01" min="0" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="page-mtop">Margin Atas (inch)</label>
              <input type="number" id="page-mtop" step="0.01" min="0" />
            </div>
            <div class="form-group">
              <label for="page-mbot">Margin Bawah (inch)</label>
              <input type="number" id="page-mbot" step="0.01" min="0" />
            </div>
            <div class="form-group">
              <label for="page-mlef">Margin Kiri (inch)</label>
              <input type="number" id="page-mlef" step="0.01" min="0" />
            </div>
            <div class="form-group">
              <label for="page-mrig">Margin Kanan (inch)</label>
              <input type="number" id="page-mrig" step="0.01" min="0" />
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-submit">
          Save Settings
        </button>
      </form>
    </div>

    <script src="{{url_for('static', filename='js/settings.js')}}"></script>
  </body>
</html>
